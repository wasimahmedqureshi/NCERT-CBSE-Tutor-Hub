            color: transparent;
            margin-bottom: 1rem;
            border-left: 6px solid #1e5a8a;
            padding-left: 1rem;
        }

            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            margin-bottom: 2rem;

            align-items: center;
            gap: 10px;

            font-size: 1.5rem;
        }

        .section-body {
            padding: 1.5rem;
        }

        .qa-item, .long-item, .mcq-item {
            background: #fefefe;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            transition: 0.1s;
        }

        .question {
            font-weight: 700;
            color: #0b3b5f;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            padding: 0.75rem;
            background: #eef4ff;
            border-radius: 16px;
            display: none;
            color: #1e4663;

        }

            font-size: 1.2rem;
        }

        .mcq-options {

            list-style: none;

</head>

    // Render navigation & content
    const navContainer = document.getElementById('chapterNav');
    const contentContainer = document.getElementById('mainContent');
    let activeChapter = 1;

    function buildNav() {
        navContainer.innerHTML = '';
        for (let i = 1; i <= 7; i++) {
            const btn = document.createElement('button');
            btn.textContent = `Ch ${i}`;
            btn.classList.add('chap-btn');
            if (i === activeChapter) btn.classList.add('active');
            btn.addEventListener('click', () => {
                activeChapter = i;
                renderChapter(activeChapter);
                document.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
            navContainer.appendChild(btn);
        }
    }

    function renderQA(items, type) {
        if (!items) return '';
        return items.map((item, idx) => `
            <div class="qa-item">
                <div class="question" onclick="toggleAnswer(this)">
                    ${idx+1}. ${item.q} <span class="toggle-icon">▼</span>
                </div>
                <div class="answer">${item.a}</div>
            </div>
        `).join('');
    }

    function renderMCQs(items) {
        if (!items) return '';
        return items.map((item, idx) => `
            <div class="mcq-item">
                <div class="question" style="cursor:default">${idx+1}. ${item.q}</div>
                <ul class="mcq-options">
                    ${item.options.map(opt => `<li>• ${opt}</li>`).join('')}
                </ul>
                <div class="correct-badge" onclick="this.nextElementSibling.style.display='block'">🔍 Show correct answer</div>
                <div class="answer" style="display:none; margin-top:8px">✅ Correct answer: ${item.answer}</div>
            </div>
        `).join('');
    }

    function renderLong(items) {
        if (!items) return '';
        return items.map((item, idx) => `
            <div class="qa-item">
                <div class="question" onclick="toggleAnswer(this)">
                    ${idx+1}. ${item.q} <span class="toggle-icon">▼</span>
                </div>
                <div class="answer">${item.a}</div>
            </div>
        `).join('');
    }

    function renderChapter(ch) {
        const data = chaptersData[ch];
        if (!data) return;
        const html = `
            <div class="chapter-title">📖 ${data.title}</div>
            <div class="section-card">
                <div class="section-header">🧠 Simple Explanation</div>
                <div class="section-body">${data.explanation}</div>
            </div>
            <div class="section-card">
                <div class="section-header">❓ 10 Short Questions & Answers</div>
                <div class="section-body">${renderQA(data.shortQA)}</div>
            </div>
            <div class="section-card">
                <div class="section-header">📋 10 Multiple Choice Questions</div>
                <div class="section-body">${renderMCQs(data.mcqs)}</div>
            </div>
            <div class="section-card">
                <div class="section-header">✍️ 5 Long Questions with Answers</div>
                <div class="section-body">${renderLong(data.longQA)}</div>
            </div>
            <div class="section-card test-paper">
                <div class="section-header">📝 Full Test Paper (Sections A, B, C)</div>
                <div class="section-body">${data.testPaper.replace(/\n/g, '<br>')}</div>
            </div>
        `;
        contentContainer.innerHTML = html;
    }

    window.toggleAnswer = function(el) {
        const answerDiv = el.nextElementSibling;
        if (answerDiv) answerDiv.classList.toggle('show');
    };

    buildNav();
    renderChapter(1);
</script>
